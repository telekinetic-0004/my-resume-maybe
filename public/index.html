<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaymin's Resume</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨🏽‍💻</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ── */
    :root, [data-theme="light"] {
      --color-bg:              #f7f6f2;
      --color-surface:         #f9f8f5;
      --color-surface-2:       #fbfbf9;
      --color-surface-offset:  #f0ede8;
      --color-border:          #d4d1ca;
      --color-divider:         #dcd9d5;
      --color-text:            #28251d;
      --color-text-muted:      #7a7974;
      --color-text-faint:      #bab9b4;
      --color-primary:         #01696f;
      --color-primary-hover:   #0c4e54;
      --color-primary-hl:      #cedcd8;
      --color-shadow-sm:       oklch(0.2 0.01 80 / 0.06);
      --color-shadow-md:       oklch(0.2 0.01 80 / 0.10);
      --radius-sm:  0.375rem;
      --radius-md:  0.5rem;
      --radius-lg:  0.75rem;
      --radius-full: 9999px;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
      --space-4: 1rem;    --space-6: 1.5rem;  --space-8: 2rem;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --header-h: 52px;
      --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:              #171614;
      --color-surface:         #1c1b19;
      --color-surface-2:       #201f1d;
      --color-surface-offset:  #252422;
      --color-border:          #393836;
      --color-divider:         #2e2d2b;
      --color-text:            #cdccca;
      --color-text-muted:      #797876;
      --color-text-faint:      #5a5957;
      --color-primary:         #4f98a3;
      --color-primary-hover:   #227f8b;
      --color-primary-hl:      #313b3b;
      --color-shadow-sm:       oklch(0 0 0 / 0.25);
      --color-shadow-md:       oklch(0 0 0 / 0.40);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
        --color-surface-offset: #252422; --color-border: #393836;
        --color-divider: #2e2d2b; --color-text: #cdccca;
        --color-text-muted: #797876; --color-text-faint: #5a5957;
        --color-primary: #4f98a3; --color-primary-hover: #227f8b;
        --color-primary-hl: #313b3b;
        --color-shadow-sm: oklch(0 0 0 / 0.25); --color-shadow-md: oklch(0 0 0 / 0.40);
      }
    }

    /* ── Base reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text);
      background: var(--color-bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    a { text-decoration: none; color: inherit; }
    a, button { transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition); }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      min-height: var(--header-h);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-6);
      gap: var(--space-4);
      box-shadow: 0 1px 3px var(--color-shadow-sm);
      z-index: 10;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
      white-space: nowrap;
    }
    .brand-name {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.01em;
    }
    .brand-sep {
      color: var(--color-text-faint);
      font-weight: 300;
    }
    .brand-label {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    /* Segmented view toggle */
    .view-toggle {
      display: flex;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: 3px;
      gap: 2px;
    }
    .toggle-btn {
      font-size: var(--text-xs);
      font-weight: 500;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .toggle-btn:hover { color: var(--color-text); }
    .toggle-btn.active {
      background: var(--color-surface-2);
      color: var(--color-text);
      box-shadow: 0 1px 3px var(--color-shadow-sm);
    }

    /* Download buttons */
    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 7px 16px;
      border-radius: var(--radius-full);
      white-space: nowrap;
      letter-spacing: 0.01em;
      min-height: 34px;
    }
    .btn-dl svg { flex-shrink: 0; }
    .btn-human-dl {
      background: var(--color-primary);
      color: #f9f8f4;
    }
    .btn-human-dl:hover {
      background: var(--color-primary-hover);
      box-shadow: 0 2px 8px var(--color-shadow-md);
    }
    .btn-ats-dl {
      background: transparent;
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
    }
    .btn-ats-dl:hover {
      background: var(--color-primary-hl);
      box-shadow: 0 2px 8px var(--color-shadow-sm);
    }

    /* Theme toggle */
    .theme-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      background: var(--color-surface-offset);
      flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--color-text); background: var(--color-surface); }

    /* PDF viewer badge */
    .viewer-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Active label pill */
    .active-badge {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-1) var(--space-4);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      pointer-events: none;
      box-shadow: 0 2px 8px var(--color-shadow-sm);
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    .active-badge.hide { opacity: 0; }

    /* Mobile: collapse download labels */
    @media (max-width: 600px) {
      .brand-sep, .brand-label { display: none; }
      .btn-dl-text { display: none; }
      .btn-dl { padding: 7px 12px; }
      .actions { gap: var(--space-2); }
      header { padding: 0 var(--space-4); }
    }
    @media (max-width: 420px) {
      .view-toggle { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" aria-label="Jaymin Chandaria's Resume">
      <span class="brand-name">Jaymin Chandaria</span>
      <span class="brand-sep" aria-hidden="true">—</span>
      <span class="brand-label">Resume</span>
    </div>

    <nav class="actions" aria-label="Resume actions">
      <!-- View toggle -->
      <div class="view-toggle" role="group" aria-label="Switch resume view">
        <button class="toggle-btn active" id="btn-human" onclick="switchView('resume')" aria-pressed="true">
          Human
        </button>
        <button class="toggle-btn" id="btn-ats" onclick="switchView('ATS')" aria-pressed="false">
          ATS
        </button>
      </div>

      <!-- Download: Human-Friendly -->
      <a class="btn-dl btn-human-dl" href="./resume.pdf" download="Jaymin_Chandaria_Resume.pdf"
         aria-label="Download Human-Friendly Resume PDF">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15V3"/><path d="m8 11 4 4 4-4"/><rect x="3" y="17" width="18" height="4" rx="1"/>
        </svg>
        <span class="btn-dl-text">Human-Friendly</span>
      </a>

      <!-- Download: ATS-Friendly -->
      <a class="btn-dl btn-ats-dl" href="./ATS.pdf" download="Jaymin_Chandaria_ATS_Resume.pdf"
         aria-label="Download ATS-Friendly Resume PDF">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15V3"/><path d="m8 11 4 4 4-4"/><rect x="3" y="17" width="18" height="4" rx="1"/>
        </svg>
        <span class="btn-dl-text">ATS-Friendly</span>
      </a>

      <!-- Theme toggle -->
      <button class="theme-btn" data-theme-toggle aria-label="Switch to dark mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </nav>
  </header>

  <div class="viewer-wrap">
    <iframe id="pdf-viewer" src="./resume.pdf" title="Resume Preview">
      <p>Your browser does not support PDFs.
        <a href="./resume.pdf">Download the Human-Friendly Resume</a> or
        <a href="./ATS.pdf">Download the ATS-Friendly Resume</a>.
      </p>
    </iframe>
    <div class="active-badge" id="active-badge" aria-live="polite">Viewing: Human-Friendly</div>
  </div>

  <script>
    (function () {
      /* ── Theme ── */
      const html = document.documentElement;
      const themeBtn = document.querySelector('[data-theme-toggle]');
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      html.setAttribute('data-theme', theme);
      updateThemeIcon();

      themeBtn && themeBtn.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', theme);
        updateThemeIcon();
        themeBtn.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode');
      });

      function updateThemeIcon() {
        if (!themeBtn) return;
        themeBtn.innerHTML = theme === 'dark'
          ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      }

      /* ── View switcher ── */
      const viewer = document.getElementById('pdf-viewer');
      const badge  = document.getElementById('active-badge');
      const btnHuman = document.getElementById('btn-human');
      const btnAts   = document.getElementById('btn-ats');
      let hideTimer;

      window.switchView = function (type) {
        const isHuman = type === 'resume';
        viewer.src = isHuman ? './resume.pdf' : './ATS.pdf';

        btnHuman.classList.toggle('active', isHuman);
        btnAts.classList.toggle('active', !isHuman);
        btnHuman.setAttribute('aria-pressed', String(isHuman));
        btnAts.setAttribute('aria-pressed', String(!isHuman));

        badge.textContent = 'Viewing: ' + (isHuman ? 'Human-Friendly' : 'ATS-Friendly');
        badge.classList.remove('hide');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => badge.classList.add('hide'), 2200);
      };

      /* Auto-hide badge on load */
      hideTimer = setTimeout(() => badge.classList.add('hide'), 2200);
    })();
  </script>
</body>
</html>

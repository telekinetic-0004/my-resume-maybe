name: Build & Deploy Resume PDFs

on:
  push:
    branches:
      - main
    paths:
      - "resume.tex"
      - "ATS.tex"
      - "public/**"
      - ".github/workflows/build_resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Compile resume.tex → resume.pdf ───────────────────────────────────
      - name: Compile resume.tex (Human-Friendly)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_lualatex: false   # set true if you use LuaLaTeX
          latexmk_use_xelatex: false    # set true if you use XeLaTeX

      # ── 3. Compile ATS.tex → ATS.pdf ─────────────────────────────────────────
      - name: Compile ATS.tex (ATS-Friendly)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ATS.tex
          latexmk_use_lualatex: false
          latexmk_use_xelatex: false

      # ── 4. Copy compiled PDFs into public/ (plain + dated filenames) ──────────
      - name: Copy PDFs to public/
        run: |
          DATE=$(date +'%Y-%m-%d')

          # Plain names — used by the iframe in index.html
          cp resume.pdf public/resume.pdf
          cp ATS.pdf    public/ATS.pdf

          # Dated names — used by the download buttons
          cp resume.pdf "public/resume_${DATE}.pdf"
          cp ATS.pdf    "public/ATS_${DATE}.pdf"

          echo "✓ resume.pdf  → public/resume.pdf"
          echo "✓ resume.pdf  → public/resume_${DATE}.pdf"
          echo "✓ ATS.pdf     → public/ATS.pdf"
          echo "✓ ATS.pdf     → public/ATS_${DATE}.pdf"

      # ── 5. Deploy public/ to GitHub Pages ────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "ci: rebuild PDFs from ${{ github.sha }}"
